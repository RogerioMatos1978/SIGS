<!--
    login.html
    ==========
    Tela de autenticacao do SIGS. Todo acesso ao sistema (exceto o painel
    publico de chamadas) exige login previo. Apos autenticar, o usuario
    assume automaticamente o proximo guiche de atendimento disponivel.
-->
{% extends "layout.html" %}

{% block titulo %}SIGS - Login{% endblock %}

{% block conteudo %}
<div class="pagina pagina-auth">
    <div class="card card-auth">
        <img class="logo-auth" src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo SENAI">
        <h1>SIGS</h1>
        <p class="subtitulo-auth">Sistema Integrado de Gerenciamento de Senhas</p>

        {% if erro %}
        <div class="mensagem-status erro">{{ erro }}</div>
        {% endif %}

        <form method="POST" class="card-formulario">
            <label>
                Login
                <input type="text" name="login" required autofocus autocomplete="username">
            </label>
            <label>
                Senha
                <input type="password" name="senha" required autocomplete="current-password">
            </label>

            <button type="submit" class="botao botao-primario botao-grande">Entrar</button>
        </form>

        <p class="auth-rodape">
            Ainda não tem uma conta?
            <a href="{{ url_for('cadastro_tela') }}">Cadastre-se</a>
        </p>
    </div>
</div>
{% endblock %}
