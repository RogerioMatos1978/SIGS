<!--
    painel.html
    ===========
    Painel público de chamadas, projetado para uso em tela cheia
    (TV/monitor). Atualiza automaticamente via Fetch/AJAX a cada N
    segundos (configurável), sem jamais recarregar a página inteira.
    Exibe a senha chamada em destaque, as últimas senhas emitidas, data,
    hora, logotipo e título do evento, com animação e bip sonoro sempre
    que uma nova chamada (ou repetição) ocorrer.
-->
{% extends "layout.html" %}

{% block titulo %}SIGS - Painel de Chamadas{% endblock %}

{% block conteudo %}
<div class="painel">

    <header class="painel-cabecalho">
        <img class="painel-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo SENAI">
        <div class="painel-titulo">
            <h1>{{ config.nome_evento }}</h1>
            <p>Painel de Chamadas</p>
        </div>
        <div class="painel-relogio">
            <div id="painel-data">--/--/----</div>
            <div id="painel-hora">--:--:--</div>
        </div>
    </header>

    <main class="painel-corpo">
        <section class="painel-chamada-atual" id="painel-chamada-atual">
            <span class="painel-label">Senha</span>
            <span id="painel-numero-atual" class="painel-numero">---</span>
            <span id="painel-guiche-atual" class="painel-guiche">--</span>
        </section>

        <section class="painel-historico">
            <h2>Últimas Senhas Emitidas</h2>
            <ul id="painel-lista-emitidas" class="painel-lista">
                <li>Carregando...</li>
            </ul>
        </section>
    </main>

</div>
{% endblock %}

{% block scripts %}
<script>
    window.SIGS_CONFIG = {
        tempoAtualizacaoMs: {{ config.tempo_atualizacao_ms | default(2000) }}
    };
</script>
<script src="{{ url_for('static', filename='js/bip.js') }}"></script>
<script src="{{ url_for('static', filename='js/painel.js') }}"></script>
{% endblock %}
